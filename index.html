<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Offline Translator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1920') center center/cover;
overflow:hidden;
}

.glass{
width:90%;
max-width:700px;

padding:30px;

background:rgba(255,255,255,0.12);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,0.2);

border-radius:30px;

box-shadow:
0 8px 32px rgba(0,0,0,0.25);

color:white;
}

.clock{
font-size:50px;
font-weight:bold;
text-align:center;
margin-bottom:15px;
}

.title{
text-align:center;
font-size:30px;
margin-bottom:20px;
}

textarea{
width:100%;
height:140px;

background:rgba(255,255,255,0.15);

border:none;

outline:none;

color:white;

padding:15px;

border-radius:20px;

font-size:18px;
}

textarea::placeholder{
color:#ddd;
}

button{
width:100%;

padding:15px;

margin-top:15px;

border:none;

border-radius:20px;

font-size:18px;

cursor:pointer;

background:rgba(255,255,255,0.2);

color:white;

backdrop-filter:blur(10px);
}

button:hover{
transform:scale(1.03);
transition:.3s;
}

.result{
margin-top:20px;

padding:20px;

border-radius:20px;

background:rgba(255,255,255,0.12);

min-height:80px;
}

</style>
</head>

<body>

<div class="glass">

<div class="clock" id="clock"></div>

<div class="title">
🌍 AI Translator
</div>

<textarea
id="inputText"
placeholder="Type something...">
</textarea>

<button onclick="translateText()">
Translate
</button>

<div class="result" id="result">
Translation appears here...
</div>

</div>

<script>

function updateClock(){

let now=new Date();

document.getElementById("clock")
.innerHTML=
now.toLocaleTimeString();
}

setInterval(updateClock,1000);

updateClock();

async function translateText(){

let text=
document.getElementById("inputText").value;

let url=
"https://api.mymemory.translated.net/get?q="
+encodeURIComponent(text)
+"&langpair=en|hi";

let response=
await fetch(url);

let data=
await response.json();

document.getElementById("result")
.innerHTML=
data.responseData.translatedText;
}

</script>

</body>
</html>
